# 环境变量配置，参考 https://wiki.hyprland.org/Configuring/Environment-variables/

# 通过 ~/.config/hypr/UserConfigs/01-UserDefaults.conf 中的 ENV 设置默认编辑器

### QT 相关变量 ###
env = QT_AUTO_SCREEN_SCALE_FACTOR,1      # 自动根据屏幕 DPI 缩放 Qt 应用
# env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1  # 禁用 Wayland 下的 Qt 窗口装饰
env = QT_QPA_PLATFORMTHEME,qt5ct        # 强制 Qt5 使用 qt5ct 主题
env = QT_QPA_PLATFORMTHEME,qt6ct        # 强制 Qt6 使用 qt6ct 主题

### XWayland 应用缩放修复（如果你在显示器配置中启用了缩放，这个很有用） ###
# 设置与 Monitors.conf 中一致的缩放比例
# 1 代表 100%，1.5 代表 150%
# 参考：https://wiki.hyprland.org/Configuring/XWayland/
# env = GDK_SCALE,1                # GTK 应用的缩放因子
# env = QT_SCALE_FACTOR,1          # Qt 应用的缩放因子

### NVIDIA 显卡相关（内容来自 Hyprland Wiki，检测到 NVIDIA GPU 时会自动激活下方变量） ###
# 参考：https://wiki.hyprland.org/Nvidia/#environment-variables

env = LIBVA_DRIVER_NAME,nvidia            # VA-API 驱动设为 NVIDIA
env = __GLX_VENDOR_LIBRARY_NAME,nvidia    # 指定 GLX 供应商库
env = NVD_BACKEND,direct                  # NVD 后端直接渲染
#env = GSK_RENDERER,ngl                    # GTK 4 的 OpenGL 渲染器

### 额外的 NVIDIA 环境变量，请谨慎启用 ###
#env = GBM_BACKEND,nvidia-drm              # GBM 后端使用 NVIDIA DRM
#env = __GL_GSYNC_ALLOWED,1                # 开启自适应垂直同步（G-Sync）
#env = __NV_PRIME_RENDER_OFFLOAD,1         # 启用 NVIDIA Prime 渲染卸载
#env = __VK_LAYER_NV_optimus,NVIDIA_only   # Vulkan 层仅使用 NVIDIA 显卡
#env = WLR_DRM_NO_ATOMIC,1                 # 禁用 atomic DRM 模式设置（某些情况下的兼容选项）

### 虚拟机及部分 NVIDIA 情况 ###
# LIBGL_ALWAYS_SOFTWARE 使用软件 mesa 渲染
#env = LIBGL_ALWAYS_SOFTWARE,1             # 警告：可能导致 Hyprland 崩溃
#env = WLR_RENDERER_ALLOW_SOFTWARE,1       # 允许软件渲染

### NVIDIA 下的 Firefox ###
# 参考：https://github.com/elFarto/nvidia-vaapi-driver#configuration
env = MOZ_DISABLE_RDD_SANDBOX,1           # 禁用 Firefox RDD 沙盒以使用硬件解码
env = EGL_PLATFORM,wayland                # Firefox 使用 Wayland EGL 后端

### Aquamarine 环境变量（Hyprland > 0.45） ###
# 参考：https://wiki.hyprland.org/Configuring/Environment-variables/#aquamarine-environment-variables
# env = AQ_TRACE,1                         # 开启更详细的日志记录
# env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0   # 显式指定使用的 DRM 设备（GPU）列表，冒号分隔，第一个为主设备
# env = AQ_MGPU_NO_EXPLICIT,1              # 禁用多 GPU 缓冲区上的显式同步
# env = AQ_NO_MODIFIERS,1                  # 禁用 DRM 缓冲区的 modifiers（格式修饰符）
