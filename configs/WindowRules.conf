# ============================================================
# TAGS（标签）系统 —— 将应用归类到同一标签，以统一应用设置
# 这里的 "tag" 是 Hyprland 中用于窗口分组的标记，不是工作区标签。
# 给窗口打上 tag 后，后续可通过 match:tag 针对整组窗口设置规则。
# ============================================================

# --- 浏览器标签 ---
# 将常见浏览器窗口都归入 "browser" 标签
windowrule = match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$, tag +browser
windowrule = match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$, tag +browser
windowrule = match:class ^(chrome-.+-Default)$, tag +browser  # Chrome 的独立 WebApp 窗口
windowrule = match:class ^([Cc]hromium)$, tag +browser
windowrule = match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$, tag +browser
windowrule = match:class ^(Brave-browser(-beta|-dev|-unstable)?)$, tag +browser
windowrule = match:class ^([Tt]horium-browser|[Cc]achy-browser)$, tag +browser
windowrule = match:class ^(zen-alpha|zen)$, tag +browser  # Zen 浏览器

# --- 通知中心标签 ---
# SwayNC 通知守护进程的相关窗口
windowrule = match:class ^(swaync-control-center|swaync-notification-window|swaync-client|class)$, tag +notif

# --- KooL 配置工具标签（作者的自定义设置界面） ---
windowrule = match:title ^(KooL Quick Cheat Sheet)$, tag +KooL_Cheat  # 快捷键参考表
windowrule = match:title ^(KooL Hyprland Settings)$, tag +KooL_Settings  # 设置面板
windowrule = match:class ^(nwg-displays|nwg-look)$, tag +KooL-Settings  # 显示器/外观管理

# --- 终端标签 ---
windowrule = match:class ^(Alacritty|kitty|kitty-dropterm)$, tag +terminal

# --- 邮件客户端标签 ---
windowrule = match:class ^([Tt]hunderbird|org.mozilla.Thunderbird)$, tag +email
windowrule = match:class ^(eu.betterbird.Betterbird)$, tag +email  # Betterbird（雷鸟分支）
windowrule = match:class ^(org.gnome.Evolution)$, tag +email

# --- 项目/开发工具标签 ---
windowrule = match:class ^(codium|codium-url-handler|VSCodium)$, tag +projects
windowrule = match:class ^(VSCode|code|code-url-handler)$, tag +projects
windowrule = match:class ^(jetbrains-.+)$, tag +projects  # 所有 JetBrains IDE
windowrule = match:class ^(dev.zed.Zed|antigravity)$, tag +projects  # Zed 编辑器

# --- 屏幕共享/录制标签 ---
windowrule = match:class ^(com.obsproject.Studio)$, tag +screenshare

# --- 即时通讯（IM）标签 ---
windowrule = match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$, tag +im
windowrule = match:class ^([Ff]erdium)$, tag +im  # 多协议聚合客户端
windowrule = match:class ^([Ww]hatsapp-for-linux)$, tag +im
windowrule = match:class ^(org.telegram.desktop|io.github.tdesktop_x64.TDesktop)$, tag +im
windowrule = match:class ^(teams-for-linux)$, tag +im
windowrule = match:class ^(im.riot.Riot|Element)$, tag +im  # Matrix 客户端

# --- 游戏窗口标签 ---
windowrule = match:class ^(gamescope)$, tag +games  # Gamescope 微合成器
windowrule = match:class ^(steam_app_\\d+)$, tag +games  # Steam 游戏进程窗口

# --- 游戏商店/启动器标签 ---
windowrule = match:class ^([Ss]team)$, tag +gamestore
windowrule = match:title ^([Ll]utris)$, tag +gamestore  # Lutris 按标题匹配
windowrule = match:class ^(com.heroicgameslauncher.hgl)$, tag +gamestore

# --- 文件管理器标签 ---
windowrule = match:class ^([Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt)$, tag +file-manager
windowrule = match:class ^(app.drey.Warp)$, tag +file-manager  # Warp 文件传输工具

# --- 壁纸工具标签 ---
windowrule = match:class ^([Ww]aytrogen)$, tag +wallpaper  # Waypaper 等壁纸管理

# --- 多媒体（音频）标签 ---
windowrule = match:class ^([Aa]udacious)$, tag +multimedia

# --- 多媒体（视频）标签 ---
windowrule = match:class ^([Mm]pv|vlc)$, tag +multimedia_video

# --- 系统设置工具标签 ---
windowrule = match:title ^(ROG Control)$, tag +settings  # 华硕 ROG 控制中心
windowrule = match:class ^(wihotspot(-gui)?)$, tag +settings  # Wi-Fi 热点工具
windowrule = match:class ^([Bb]aobab|org.gnome.[Bb]aobab)$, tag +settings  # 磁盘使用分析器
windowrule = match:class ^(gnome-disks|wihotspot(-gui)?)$, tag +settings  # 磁盘工具/热点
windowrule = match:title (Kvantum Manager), tag +settings  # Qt 主题管理器
windowrule = match:class ^(file-roller|org.gnome.FileRoller)$, tag +settings  # 归档管理器
windowrule = match:class ^(nm-applet|nm-connection-editor|blueman-manager)$, tag +settings  # 网络/蓝牙
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, tag +settings  # 音量控制
windowrule = match:class ^(qt5ct|qt6ct)$, tag +settings  # Qt 配置工具
windowrule = match:class (xdg-desktop-portal-gtk), tag +settings  # 桌面门户
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, tag +settings  # 鉴权弹窗
windowrule = match:class ^([Rr]ofi)$, tag +settings  # 应用启动器
windowrule = match:class ^(btrfs-assistant)$, tag +settings  # Btrfs 管理工具
windowrule = match:class ^(timeshift-gtk)$, tag +settings  # 系统快照还原

# --- 查看器（文档/系统监控）标签 ---
windowrule = match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$, tag +viewer
windowrule = match:class ^(evince)$, tag +viewer  # 文档查看器
windowrule = match:class ^(eog|org.gnome.Loupe)$, tag +viewer  # 图片查看器

# ============================================================
# 环境变量（Environment Variables）
# 参考：https://wiki.hyprland.org/Configuring/Environment-variables/
# 用户默认编辑器会从 ~/.config/hypr/UserConfigs/01-UserDefaults.conf 中设置
# ============================================================

### QT 变量（已注释掉，按需启用） ###
# env = QT_AUTO_SCREEN_SCALE_FACTOR,1             # 自动缩放
# env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1     # 禁用窗口装饰
# env = QT_QPA_PLATFORMTHEME,qt5ct               # Qt5 主题平台
# env = QT_QPA_PLATFORMTHEME,qt6ct               # Qt6 主题平台

### XWayland 应用缩放修复（如果显示器启用了缩放，可设置相同值） ###
# 1 即 100%，1.5 即 150%
# https://wiki.hyprland.org/Configuring/XWayland/
# env = GDK_SCALE,1
# env = QT_SCALE_FACTOR,1

### NVIDIA 显卡环境变量（来自 Hyprland Wiki，检测到 N 卡时会自动启用） ###
# 参考：https://wiki.hyprland.org/Nvidia/#environment-variables
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct
# env = GSK_RENDERER,ngl

### 更多 N 卡高级选项（谨慎启用） ###
# env = GBM_BACKEND,nvidia-drm
# env = __GL_GSYNC_ALLOWED,1                       # 自适应垂直同步
# env = __NV_PRIME_RENDER_OFFLOAD,1
# env = __VK_LAYER_NV_optimus,NVIDIA_only
# env = WLR_DRM_NO_ATOMIC,1

### 虚拟机 & 或许 N 卡都能用 ###
# LIBGL_ALWAYS_SOFTWARE 强制使用软件渲染
# env = LIBGL_ALWAYS_SOFTWARE,1                    # 警告：可能导致 Hyprland 崩溃
# env = WLR_RENDERER_ALLOW_SOFTWARE,1

### N 卡 Firefox 硬解 ###
# 参考：https://github.com/elFarto/nvidia-vaapi-driver#configuration
# env = MOZ_DISABLE_RDD_SANDBOX,1
# env = EGL_PLATFORM,wayland

### Aquamarine 环境变量（Hyprland > 0.45 新渲染后端） ###
# https://wiki.hyprland.org/Configuring/Environment-variables/#aquamarine-environment-variables
# env = AQ_TRACE,1                                  # 详细日志
# env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0  # 指定 DRM 设备顺序
# env = AQ_MGPU_NO_EXPLICIT,1                       # 多 GPU 关闭显式同步
# env = AQ_NO_MODIFIERS,1                           # 禁用 DRM 修饰符

# ============================================================
# 针对特定标签的统一窗口规则（Tag-based Overrides）
# ============================================================

# 视频窗口：禁用模糊，保持完全不透明
windowrule = match:tag multimedia_video, no_blur on
windowrule = match:tag multimedia_video, opacity 1.0

# 音频窗口：同上
windowrule = match:tag multimedia, no_blur on
windowrule = match:tag multimedia, opacity 1.0

# ============================================================
# 窗口位置规则（POSITION）
# ============================================================

# KooL 快捷参考和设置界面居中
windowrule = match:tag KooL_Cheat, center on
windowrule = match:tag KooL-Settings, center on
# ROG 控制中心居中
windowrule = match:title ^(ROG Control)$, center on
# 快捷键参考窗口居中（通常由快捷方式打开）
windowrule = match:title ^(Keybindings)$, center on
# 音量控制窗口居中
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, center on
# Ferdium 多合一通讯软件居中
windowrule = match:class ^([Ff]erdium)$, center on

# ============================================================
# 空闲抑制（Idle Inhibit） —— 全屏时阻止系统休眠/锁屏
# ============================================================

# 只要任意窗口为全屏状态，就抑制空闲
windowrule = match:fullscreen true, idle_inhibit fullscreen
windowrule = idle_inhibit fullscreen, match:fullscreen 1
# 备用规则：匹配全屏窗口（通过 class 或 title 的通配符）
windowrule = idle_inhibit fullscreen, match:class ^(*)$
windowrule = idle_inhibit fullscreen, match:title ^(*)$

# ============================================================
# 浮动窗口规则（FLOAT）
# ============================================================

# 帮助文档和壁纸工具浮动并居中
windowrule = match:tag KooL_Cheat, float on
windowrule = match:tag wallpaper, float on, center on
# 所有设置类窗口浮动居中
windowrule = match:tag settings, float on, center on
windowrule = match:tag viewer, float on, center on
windowrule = match:tag KooL-Settings, float on, center on

# 指定应用浮动
windowrule = match:class ([Zz]oom|onedriver|onedriver-launcher), float on  # 会议和 OneDrive
windowrule = match:class (org.gnome.Calculator|qalculate-gtk), float on  # 计算器
windowrule = match:class ^(mpv|com.github.rafostar.Clapper)$, float on  # 视频播放器浮动
windowrule = match:class ^([Qq]alculate-gtk)$, float on
windowrule = match:class ^([Ff]erdium)$, float on

# 弹窗与对话框（Popup / Dialogue）浮动处理
# 鉴权弹窗浮动居中
windowrule = match:title ^(Authentication Required)$, float on, center on
# VSCodium / VSCode 子窗口（非主窗口）浮动
windowrule = match:class (codium|codium-url-handler|VSCodium) match:title negative:(.*codium.*|.*VSCodium.*), float on
# Heroic Games Launcher 子窗口浮动
windowrule = match:class ^(com.heroicgameslauncher.hgl)$ match:title negative:(Heroic Games Launcher), float on
# Steam 子窗口（如好友列表、设置等）浮动
windowrule = match:class ^([Ss]team)$ match:title negative:^([Ss]team)$, float on
# 文件对话框：添加文件夹到工作区，浮动并指定尺寸居中
windowrule = match:title ^(Add Folder to Workspace)$, float on, size (monitor_w*0.7) (monitor_h*0.6), center on
# 保存对话框
windowrule = match:title ^(Save As)$, float on, size (monitor_w*0.7) (monitor_h*0.6), center on
# 打开文件对话框
windowrule = match:initial_title (Open Files), float on, size (monitor_w*0.7) (monitor_h*0.6)
# SDDM 背景设置窗口，非常小尺寸浮动
windowrule = match:title ^(SDDM Background)$, float on, center on, size (monitor_w*0.16) (monitor_h*0.12)
# yad 通用对话框，小尺寸居中
windowrule = match:class ^(yad)$, float on, center on, size (monitor_w*0.2) (monitor_h*0.2)
# Hyprland 捐赠提示窗口，浮动居中
windowrule = match:class ^(hyprland-donate-screen)$, float on, center on

# ============================================================
# 窗口透明度规则（OPACITY）
# 格式：opacity <active> <inactive>  ，焦点窗口/非焦点窗口透明度
# ============================================================

# IM 通讯软件
windowrule = match:tag im, opacity 0.94 0.86
# 多媒体窗口
windowrule = match:tag multimedia, opacity 0.94 0.86
# 文件管理器
windowrule = match:tag file-manager, opacity 0.9 0.8
# 设置窗口
windowrule = match:tag settings, opacity 0.8 0.7
# 查看器
windowrule = match:tag viewer, opacity 0.82 0.75
# 壁纸工具
windowrule = match:tag wallpaper, opacity 0.9 0.7
# 简易文本编辑器
windowrule = match:class ^(gedit|org.gnome.TextEditor|mousepad)$, opacity 0.8 0.7
# BitTorrent 客户端
windowrule = match:class ^(deluge)$, opacity 0.9 0.8
# 密码/密钥管理
windowrule = match:class ^(seahorse)$, opacity 0.9 0.8
# 画中画窗口
windowrule = match:title ^(Picture-in-Picture)$, opacity 0.95 0.75

# ============================================================
# 窗口尺寸规则（SIZE）
# 使用 monitor_w 和 monitor_h 表示显示器宽高的比例
# ============================================================

# KooL 快捷参考窗口，宽65% 高90%
windowrule = match:tag KooL_Cheat, size (monitor_w*0.65) (monitor_h*0.9)
# 壁纸选择器
windowrule = match:tag wallpaper, size (monitor_w*0.7) (monitor_h*0.7)
# 设置窗口默认大小
windowrule = match:tag settings, size (monitor_w*0.7) (monitor_h*0.7)
# Ferdium 客户端，宽60% 高70%
windowrule = match:class ^([Ff]erdium)$, size (monitor_w*0.6) (monitor_h*0.7)

# ============================================================
# 模糊与全屏规则（BLUR & FULLSCREEN）
# ============================================================

# 游戏窗口：关闭模糊，且默认不全屏（由游戏自己决定）
windowrule = match:tag games, no_blur on, fullscreen 0
windowrule = match:tag games, fullscreen 0

# JetBrains IDE 的弹出提示（如代码补全详情）不自动获取焦点，避免打断输入
windowrule = match:class ^(jetbrains-*), no_initial_focus on
# 某些以 "wind" 开头的标题窗口（可能是某些工具提示）也不抢焦点
windowrule = match:title ^(wind.*)$, no_initial_focus on

# ============================================================
# 层规则（LAYER RULES） —— 应用于 Wayland 层 Shell
# ============================================================

# Rofi 启动器所在层开启模糊
layerrule = match:namespace rofi, blur on
# 通知层（如 SwayNC）开启模糊
layerrule = match:namespace notifications, blur on
# quickshell 概览层（可能是一个自定义桌面/窗口概览）开启模糊并设置忽略透明度阈值
layerrule = match:namespace quickshell:overview, blur on
layerrule = match:namespace quickshell:overview, ignore_alpha 0.5

# ============================================================
# 具名窗口规则（Named Window Rules） —— 更精细的特殊行为
# ============================================================

# Whatsapp 客户端（支持多种包名）的专属规则
windowrule {
    name = Whatsapp-zapzap
    match:class = ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
    size = (monitor_w*0.6) (monitor_h*0.7)  # 固定尺寸
    center = on                               # 居中
}

# 画中画（Picture-in-Picture）窗口规则
windowrule {
    name = Picture-in-Picture
    match:title = ^(Picture-in-Picture)$
    float = on                                # 浮动
    move = 72% 7%                             # 定位到屏幕右上区域（72% 水平，7% 垂直）
    opacity = 0.95 0.75                       # 焦点/失焦透明度
    pin = on                                  # 置顶，不随工作区切换
    keep_aspect_ratio = on                    # 保持原始宽高比
    size = (monitor_w*0.3) (monitor_h*0.3)    # 占屏幕 30%
}

# Thunar 文件操作进度对话框
windowrule {
    name = Thunar-Progress-bar
    match:class = ^(thunar)$
    match:title = ^(File Operation Progress)$ # 仅匹配进度条窗口
    float = on
    center = on
    size = (monitor_w*0.26) (monitor_h*0.18)  # 较小的尺寸
}
