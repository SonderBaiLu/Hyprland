# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# 默认快捷键配置
# 访问 https://wiki.hyprland.org/Configuring/Binds/ 获取更多信息

# /* ---- ✴️ 变量定义 ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs
$UserScripts = $HOME/.config/hypr/UserScripts

# 用户默认应用设置 - 在该文件中设置你的默认终端和文件管理器
source= $UserConfigs/01-UserDefaults.conf

#### 标准快捷键 (STANDARD) ####
# 通用快捷键
#bindr = $mainMod, $mainMod_L, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window # 按下 Win 键启动 rofi 菜单
bindd = $mainMod, D, 应用启动器, exec, pkill rofi || true && rofi -show drun -modi drun,filebrowser,run,window
bindd = $mainMod, B, 打开默认浏览器, exec, xdg-open "https://"
bindd = $mainMod, A, 桌面总览菜单, exec, $scriptsDir/OverviewToggle.sh # 切换 quickshell 或 ags 总览视图
#bindd = $mainMod, A, ags 总览菜单, exec, pkill rofi || true && ags -t 'overview'
#bindd = $mainMod, A, Quickshell 总览菜单, global, quickshell:overviewToggle
bindd = $mainMod, Return, 打开终端, exec, $term
bindd = $mainMod, E, 打开文件管理器, exec, $files

# 特色功能 / 附加组件 (FEATURES / EXTRAS)
bindd = $mainMod ALT, T, 全局主题切换 (Wallust), exec, $scriptsDir/ThemeChanger.sh
bindd = $mainMod, H, 快捷键帮助/提示单, exec, $scriptsDir/KeyHints.sh
bindd = $mainMod ALT, R, 刷新状态栏和菜单, exec, $scriptsDir/Refresh.sh
bindd = $mainMod ALT, E, 表情包输入菜单, exec, $scriptsDir/RofiEmoji.sh
bindd = $mainMod, S, 网络搜索, exec, $scriptsDir/RofiSearch.sh
bindd = $mainMod CTRL, S, 窗口切换器, exec, rofi -show window
bindd = $mainMod ALT, O, 开启/关闭模糊效果, exec, $scriptsDir/ChangeBlur.sh
bindd = $mainMod SHIFT, G, 开启/关闭游戏模式, exec, $scriptsDir/GameMode.sh
bindd = $mainMod ALT, L, 切换 Master/Dwindle 窗口布局, exec, $scriptsDir/ChangeLayout.sh
bindd = $mainMod ALT, V, 剪贴板管理器, exec, $scriptsDir/ClipManager.sh
bindd = $mainMod CTRL, R, Rofi 主题选择器, exec, $scriptsDir/RofiThemeSelector.sh
bindd = $mainMod CTRL SHIFT, R, Rofi 主题选择器 (修改版), exec, pkill rofi || true && $scriptsDir/RofiThemeSelector-modified.sh

bindd = $mainMod SHIFT, F, 全屏切换, fullscreen
bindd = $mainMod CTRL, F, 最大化窗口 (保留状态栏), fullscreen, 1
bindd = $mainMod, SPACE, 浮动当前窗口, togglefloating,
bindd = $mainMod ALT, SPACE, 浮动所有窗口, exec, hyprctl dispatch workspaceopt allfloat
bindd = $mainMod SHIFT, Return, 下拉式终端, exec, $scriptsDir/Dropterminal.sh $term

# 桌面缩放 / 放大镜
bindd = $mainMod ALT, mouse_down, 放大桌面, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
bindd = $mainMod ALT, mouse_up, 缩小桌面, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')"

# 状态栏相关 (Waybar)
bindd = $mainMod CTRL ALT, B, 显示/隐藏状态栏, exec, pkill -SIGUSR1 waybar
bindd = $mainMod CTRL, B, 状态栏样式菜单, exec, $scriptsDir/WaybarStyles.sh
bindd = $mainMod ALT, B, 状态栏布局菜单, exec, $scriptsDir/WaybarLayout.sh

# 夜间护眼模式 (Hyprsunset)
bindd = $mainMod, N, 切换夜间模式, exec, $scriptsDir/Hyprsunset.sh toggle

# 特色功能 / 用户脚本 (UserScripts)
bindd = $mainMod SHIFT, M, 在线音乐电台, exec, $UserScripts/RofiBeats.sh
bindd = $mainMod, W, 选择桌面壁纸, exec, $UserScripts/WallpaperSelect.sh
bindd = $mainMod SHIFT, W, 壁纸特效设置, exec, $UserScripts/WallpaperEffects.sh
bindd = CTRL ALT, W, 随机更换壁纸, exec, $UserScripts/WallpaperRandom.sh
bindd = $mainMod CTRL, O, 切换当前窗口透明度, setprop, active opaque toggle
bindd = $mainMod SHIFT, K, 搜索快捷键大全, exec, $scriptsDir/KeyBinds.sh
bindd = $mainMod SHIFT, A, 动画效果切换菜单, exec, $scriptsDir/Animations.sh
bindd = $mainMod SHIFT, O, 更换 oh-my-zsh 主题, exec, $UserScripts/ZshChangeTheme.sh
bindlnd = ALT_L, SHIFT_L, 全局切换键盘布局, exec, $scriptsDir/KeyboardLayout.sh switch
bindlnd = SHIFT_L, ALT_L, 按窗口切换键盘布局, exec, $scriptsDir/Tak0-Per-Window-Switch.sh
bindd = $mainMod ALT, C, 打开计算器, exec, $UserScripts/RofiCalc.sh

# 将当前工作区移动到其他显示器 (多屏幕使用)
bindd = $mainMod CTRL, F9, 将工作区移至左侧显示器, movecurrentworkspacetomonitor, l
bindd = $mainMod CTRL, F10, 将工作区移至右侧显示器, movecurrentworkspacetomonitor, r
bindd = $mainMod CTRL, F11, 将工作区移至上方显示器, movecurrentworkspacetomonitor, u
bindd = $mainMod CTRL, F12, 将工作区移至下方显示器, movecurrentworkspacetomonitor, d


#### 系统控制 (SYSTEM) ####
bindd = CTRL ALT, Delete, 退出 Hyprland 环境, exec, hyprctl dispatch exit 0
bindd = $mainMod, Q, 关闭当前窗口, killactive,
bindd = $mainMod SHIFT, Q, 强制结束当前进程, exec, $scriptsDir/KillActiveProcess.sh
bindd = CTRL ALT, L, 锁定屏幕, exec, $scriptsDir/LockScreen.sh
bindd = CTRL ALT, P, 电源控制菜单, exec, $scriptsDir/Wlogout.sh
bindd = $mainMod SHIFT, N, 打开通知面板, exec, swaync-client -t -sw
bindd = $mainMod SHIFT, E, 快捷系统设置菜单, exec, $scriptsDir/Kool_Quick_Settings.sh

# Master 布局专用快捷键
bindd = $mainMod CTRL, D, 移除 Master 窗口, layoutmsg, removemaster
bindd = $mainMod, I, 添加为 Master 窗口, layoutmsg, addmaster
bindd = $mainMod CTRL, Return, 与 Master 窗口互换位置, layoutmsg, swapwithmaster

# Dwindle 布局专用快捷键
bindd = $mainMod, P, 切换伪平铺模式, pseudo,

# 通用布局快捷键 (适用于 Master 或 Dwindle)
bindd = $mainMod, M, 设置窗口分割比例为 0.3, exec, hyprctl dispatch splitratio 0.3
exec-once = $scriptsDir/ChangeLayout.sh init # 布局相关的初始脚本

# 循环切换窗口 (如果是浮动窗口则置顶)
bindd = ALT, tab, 切换到下一个窗口, cyclenext
bindd = ALT, tab, 将活动窗口置于顶层, bringactivetotop

# 多媒体与特殊功能按键 (F1-F12 上的功能键)
bindeld = , xf86audioraisevolume, 提高音量, exec, $scriptsDir/Volume.sh --inc
bindeld = , xf86audiolowervolume, 降低音量, exec, $scriptsDir/Volume.sh --dec
bindeld = ALT, xf86audioraisevolume, 微调提高音量, exec, $scriptsDir/Volume.sh --inc-precise
bindeld = ALT, xf86audiolowervolume, 微调降低音量, exec, $scriptsDir/Volume.sh --dec-precise
bindld = , xf86AudioMicMute, 麦克风静音切换, exec, $scriptsDir/Volume.sh --toggle-mic
bindld = , xf86audiomute, 扬声器静音切换, exec, $scriptsDir/Volume.sh --toggle
bindld = , xf86Sleep, 休眠系统, exec, systemctl suspend
bindld = , xf86Rfkill, 飞行模式切换, exec, $scriptsDir/AirplaneMode.sh

# 媒体播放控制
bindld = , xf86AudioPlayPause, 播放/暂停, exec, $scriptsDir/MediaCtrl.sh --pause
bindld = , xf86AudioPause, 暂停, exec, $scriptsDir/MediaCtrl.sh --pause
bindld = , xf86AudioPlay, 播放, exec, $scriptsDir/MediaCtrl.sh --pause
bindld = , xf86AudioNext, 下一首, exec, $scriptsDir/MediaCtrl.sh --nxt
bindld = , xf86AudioPrev, 上一首, exec, $scriptsDir/MediaCtrl.sh --prv
bindld = , xf86audiostop, 停止播放, exec, $scriptsDir/MediaCtrl.sh --stop

# 截图快捷键
bindd = $mainMod, Print, 立即截取全屏, exec, $scriptsDir/ScreenShot.sh --now
bindd = $mainMod SHIFT, Print, 框选区域截图, exec, $scriptsDir/ScreenShot.sh --area
bindd = $mainMod CTRL, Print, 延迟 5 秒截图, exec, $scriptsDir/ScreenShot.sh --in5
bindd = $mainMod CTRL SHIFT, Print, 延迟 10 秒截图, exec, $scriptsDir/ScreenShot.sh --in10
bindd = ALT, Print, 截取当前活动窗口, exec, $scriptsDir/ScreenShot.sh --active

# 使用 swappy 截图工具
bindd = $mainMod SHIFT, S, 截图并在 Swappy 中编辑, exec, $scriptsDir/ScreenShot.sh --swappy

# 调整窗口尺寸
binded = $mainMod SHIFT, left, 窗口向左缩小, resizeactive, -50 0
binded = $mainMod SHIFT, right, 窗口向右放大, resizeactive, 50 0
binded = $mainMod SHIFT, up, 窗口向上缩小, resizeactive, 0 -50
binded = $mainMod SHIFT, down, 窗口向下放大, resizeactive, 0 50

# 移动窗口位置
bindd = $mainMod CTRL, left, 窗口向左移动, movewindow, l
bindd = $mainMod CTRL, right, 窗口向右移动, movewindow, r
bindd = $mainMod CTRL, up, 窗口向上移动, movewindow, u
bindd = $mainMod CTRL, down, 窗口向下移动, movewindow, d

# 交换窗口位置
bindd = $mainMod ALT, left, 与左侧窗口互换, swapwindow, l
bindd = $mainMod ALT, right, 与右侧窗口互换, swapwindow, r
bindd = $mainMod ALT, up, 与上方窗口互换, swapwindow, u
bindd = $mainMod ALT, down, 与下方窗口互换, swapwindow, d

# 窗口群组管理 (Group)
bindd = $mainMod, G, 开启/关闭窗口编组, togglegroup

# 在群组内导航
bindd = $mainMod, Tab, 切换到组内下一个窗口, changegroupactive, f
bindd = $mainMod CTRL, tab, 切换组内活动窗口, changegroupactive
bindd = $mainMod SHIFT, Tab, 切换到组内上一个窗口, changegroupactive, b

# 窗口移入/移出群组
bindd = $mainMod CTRL, K, 将窗口向左移入群组, moveintogroup, l 
bindd = $mainMod CTRL, L, 将窗口向右移入群组, moveintogroup, r 
bindd = $mainMod CTRL, H, 将窗口移出群组, moveoutofgroup 

# 改变焦点方向
bindd = $mainMod, left, 焦点向左移动, movefocus, l
bindd = $mainMod, right, 焦点向右移动, movefocus, r
bindd = $mainMod, up, 焦点向上移动, movefocus, u
bindd = $mainMod, down, 焦点向下移动, movefocus, d

# 工作区切换
bindd = $mainMod, tab, 切换到下一个工作区, workspace, m+1
bindd = $mainMod SHIFT, tab, 切换到上一个工作区, workspace, m-1

# 特殊工作区 (Special Workspace - 后台收纳工作区)
bindd = $mainMod SHIFT, U, 将窗口放入特殊工作区, movetoworkspace, special
bindd = $mainMod, U, 显示/隐藏特殊工作区, togglespecialworkspace,

# 切换工作区 1-10
bindd = $mainMod, code:10, 切换到工作区 1, workspace, 1 
bindd = $mainMod, code:11, 切换到工作区 2, workspace, 2 
bindd = $mainMod, code:12, 切换到工作区 3, workspace, 3 
bindd = $mainMod, code:13, 切换到工作区 4, workspace, 4 
bindd = $mainMod, code:14, 切换到工作区 5, workspace, 5 
bindd = $mainMod, code:15, 切换到工作区 6, workspace, 6 
bindd = $mainMod, code:16, 切换到工作区 7, workspace, 7 
bindd = $mainMod, code:17, 切换到工作区 8, workspace, 8 
bindd = $mainMod, code:18, 切换到工作区 9, workspace, 9 
bindd = $mainMod, code:19, 切换到工作区 10, workspace, 10 

# 携带当前窗口移动至指定工作区 1-10 并跳转
bindd = $mainMod SHIFT, code:10, 携带窗口至工作区 1, movetoworkspace, 1 
bindd = $mainMod SHIFT, code:11, 携带窗口至工作区 2, movetoworkspace, 2 
bindd = $mainMod SHIFT, code:12, 携带窗口至工作区 3, movetoworkspace, 3 
bindd = $mainMod SHIFT, code:13, 携带窗口至工作区 4, movetoworkspace, 4 
bindd = $mainMod SHIFT, code:14, 携带窗口至工作区 5, movetoworkspace, 5 
bindd = $mainMod SHIFT, code:15, 携带窗口至工作区 6, movetoworkspace, 6 
bindd = $mainMod SHIFT, code:16, 携带窗口至工作区 7, movetoworkspace, 7 
bindd = $mainMod SHIFT, code:17, 携带窗口至工作区 8, movetoworkspace, 8 
bindd = $mainMod SHIFT, code:18, 携带窗口至工作区 9, movetoworkspace, 9 
bindd = $mainMod SHIFT, code:19, 携带窗口至工作区 10, movetoworkspace, 10 
bindd = $mainMod SHIFT, bracketleft, 携带窗口至上一个工作区, movetoworkspace, -1 
bindd = $mainMod SHIFT, bracketright, 携带窗口至下一个工作区, movetoworkspace, +1 

# 将当前窗口静默发送至指定工作区 1-10 (不跟随跳转)
bindd = $mainMod CTRL, code:10, 静默发送至工作区 1, movetoworkspacesilent, 1 
bindd = $mainMod CTRL, code:11, 静默发送至工作区 2, movetoworkspacesilent, 2 
bindd = $mainMod CTRL, code:12, 静默发送至工作区 3, movetoworkspacesilent, 3 
bindd = $mainMod CTRL, code:13, 静默发送至工作区 4, movetoworkspacesilent, 4 
bindd = $mainMod CTRL, code:14, 静默发送至工作区 5, movetoworkspacesilent, 5 
bindd = $mainMod CTRL, code:15, 静默发送至工作区 6, movetoworkspacesilent, 6 
bindd = $mainMod CTRL, code:16, 静默发送至工作区 7, movetoworkspacesilent, 7 
bindd = $mainMod CTRL, code:17, 静默发送至工作区 8, movetoworkspacesilent, 8 
bindd = $mainMod CTRL, code:18, 静默发送至工作区 9, movetoworkspacesilent, 9 
bindd = $mainMod CTRL, code:19, 静默发送至工作区 10, movetoworkspacesilent, 10 
bindd = $mainMod CTRL, bracketleft, 静默发送至上一个工作区, movetoworkspacesilent, -1 
bindd = $mainMod CTRL, bracketright, 静默发送至下一个工作区, movetoworkspacesilent, +1 

# 鼠标滚轮切换工作区
bindd = $mainMod, mouse_down, 滚轮切换至下一个工作区, workspace, e+1
bindd = $mainMod, mouse_up, 滚轮切换至上一个工作区, workspace, e-1
bindd = $mainMod, period, 按键切换至下一个工作区, workspace, e+1
bindd = $mainMod, comma, 按键切换至上一个工作区, workspace, e-1

# 鼠标拖拽功能
bindmd = $mainMod, mouse:272, 按住拖动窗口位置, movewindow # 272 为鼠标左键
bindmd = $mainMod, mouse:273, 按住调整窗口大小, resizewindow # 273 为鼠标右键
